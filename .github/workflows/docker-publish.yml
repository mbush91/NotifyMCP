name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        shell: bash
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/notifymcp
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tags=("-t" "${IMAGE_NAME}:sha-${short_sha}")

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            tags+=("-t" "${IMAGE_NAME}:latest")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags+=("-t" "${IMAGE_NAME}:${GITHUB_REF_NAME}")
          fi

          docker buildx build --push "${tags[@]}" .
